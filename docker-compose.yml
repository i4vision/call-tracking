version: '3.8'

services:
  app:
    build: .
    container_name: call_tracking_app
    restart: unless-stopped
    ports:
      - "19432:8080"
    volumes:
      # Use a Docker named volume that connects to the Windows share
      - archive_data:/archive:ro
    environment:
      - ARCHIVE_PATH=/archive
    env_file:
      - backend/.env

volumes:
  archive_data:
    driver_opts:
      type: cifs
      # Replace <YOUR_WINDOWS_IP> with the actual IP address of your Windows PC
      # If your share requires a password, change username/password here.
      o: "username=ia_agustin,password=Bustillo50052404!ia"
      device: "//10.115.14.9/OpenPhoneArchive"
